name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_FILE: RightMgr.csproj
  CONFIGURATION: Release
  TARGET_FRAMEWORK: net8.0-windows10.0.19041.0
  APP_VERSION: 1.0.0
  APPX_VERSION: 1.0.0.0

jobs:
  build:
    name: Build and package
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: win-x86
            rid: win-x86
            platform: x86
          - profile: win-x64
            rid: win-x64
            platform: x64
          - profile: win-arm64
            rid: win-arm64
            platform: ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Apply release version
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_EVENT_NAME -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ github.ref_name }}" }
          $version = $tag -replace '^v', ''

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH, for example v1.0.1. Actual tag: $tag"
          }

          $appxVersion = "$version.0"
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "APPX_VERSION=$appxVersion" >> $env:GITHUB_ENV

          [xml]$project = Get-Content $env:PROJECT_FILE
          $propertyGroup = $project.Project.PropertyGroup[0]
          foreach ($name in @("Version", "PackageVersion", "InformationalVersion")) {
            if (-not $propertyGroup.$name) {
              $propertyGroup.AppendChild($project.CreateElement($name)) | Out-Null
            }
            $propertyGroup.$name = $version
          }
          foreach ($name in @("AssemblyVersion", "FileVersion")) {
            if (-not $propertyGroup.$name) {
              $propertyGroup.AppendChild($project.CreateElement($name)) | Out-Null
            }
            $propertyGroup.$name = $appxVersion
          }
          $project.Save((Join-Path $env:GITHUB_WORKSPACE $env:PROJECT_FILE))

          [xml]$packageManifest = Get-Content "Package.appxmanifest"
          $packageManifest.Package.Identity.Version = $appxVersion
          $packageManifest.Save((Join-Path $env:GITHUB_WORKSPACE "Package.appxmanifest"))

          [xml]$appManifest = Get-Content "app.manifest"
          $ns = New-Object System.Xml.XmlNamespaceManager($appManifest.NameTable)
          $ns.AddNamespace("asm", "urn:schemas-microsoft-com:asm.v1")
          $identity = $appManifest.SelectSingleNode("/asm:assembly/asm:assemblyIdentity", $ns)
          $identity.SetAttribute("version", $appxVersion)
          $appManifest.Save((Join-Path $env:GITHUB_WORKSPACE "app.manifest"))

      - name: Publish
        run: dotnet publish $env:PROJECT_FILE -c $env:CONFIGURATION -r ${{ matrix.rid }} -p:PublishProfile=${{ matrix.profile }} -p:Platform=${{ matrix.platform }} -p:PlatformTarget=${{ matrix.platform }} -p:Version=$env:APP_VERSION -p:PackageVersion=$env:APP_VERSION -p:InformationalVersion=$env:APP_VERSION -p:AssemblyVersion=$env:APPX_VERSION -p:FileVersion=$env:APPX_VERSION

      - name: Package
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "bin\$env:CONFIGURATION\$env:TARGET_FRAMEWORK\${{ matrix.rid }}\publish"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          $zipPath = Join-Path $distDir "RightMgr-${{ matrix.rid }}.zip"

          if (-not (Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }

          New-Item -ItemType Directory -Force $distDir | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }

          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RightMgr-${{ matrix.rid }}
          path: dist/RightMgr-${{ matrix.rid }}.zip
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RightMgr-${{ matrix.rid }}.zip

  framework-dependent:
    name: Build framework-dependent
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Apply release version
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_EVENT_NAME -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ github.ref_name }}" }
          $version = $tag -replace '^v', ''

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH, for example v1.0.1. Actual tag: $tag"
          }

          $appxVersion = "$version.0"
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "APPX_VERSION=$appxVersion" >> $env:GITHUB_ENV

          [xml]$project = Get-Content $env:PROJECT_FILE
          $propertyGroup = $project.Project.PropertyGroup[0]
          foreach ($name in @("Version", "PackageVersion", "InformationalVersion")) {
            if (-not $propertyGroup.$name) {
              $propertyGroup.AppendChild($project.CreateElement($name)) | Out-Null
            }
            $propertyGroup.$name = $version
          }
          foreach ($name in @("AssemblyVersion", "FileVersion")) {
            if (-not $propertyGroup.$name) {
              $propertyGroup.AppendChild($project.CreateElement($name)) | Out-Null
            }
            $propertyGroup.$name = $appxVersion
          }
          $project.Save((Join-Path $env:GITHUB_WORKSPACE $env:PROJECT_FILE))

          [xml]$packageManifest = Get-Content "Package.appxmanifest"
          $packageManifest.Package.Identity.Version = $appxVersion
          $packageManifest.Save((Join-Path $env:GITHUB_WORKSPACE "Package.appxmanifest"))

          [xml]$appManifest = Get-Content "app.manifest"
          $ns = New-Object System.Xml.XmlNamespaceManager($appManifest.NameTable)
          $ns.AddNamespace("asm", "urn:schemas-microsoft-com:asm.v1")
          $identity = $appManifest.SelectSingleNode("/asm:assembly/asm:assemblyIdentity", $ns)
          $identity.SetAttribute("version", $appxVersion)
          $appManifest.Save((Join-Path $env:GITHUB_WORKSPACE "app.manifest"))

      - name: Publish framework-dependent
        run: dotnet publish $env:PROJECT_FILE -c $env:CONFIGURATION -r win-x64 --self-contained false -p:Platform=x64 -p:PlatformTarget=x64 -p:PublishReadyToRun=false -p:Version=$env:APP_VERSION -p:PackageVersion=$env:APP_VERSION -p:InformationalVersion=$env:APP_VERSION -p:AssemblyVersion=$env:APPX_VERSION -p:FileVersion=$env:APPX_VERSION -o dist\framework-dependent

      - name: Package framework-dependent
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "dist\framework-dependent"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "dist\RightMgr-win-x64-framework-dependent.zip"

          if (-not (Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }

          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }

          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath -Force

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: RightMgr-win-x64-framework-dependent
          path: dist/RightMgr-win-x64-framework-dependent.zip
          if-no-files-found: error

      - name: Upload framework-dependent release asset
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RightMgr-win-x64-framework-dependent.zip

  single-file:
    name: Build single file
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Apply release version
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_EVENT_NAME -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ github.ref_name }}" }
          $version = $tag -replace '^v', ''

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH, for example v1.0.1. Actual tag: $tag"
          }

          $appxVersion = "$version.0"
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "APPX_VERSION=$appxVersion" >> $env:GITHUB_ENV

          [xml]$project = Get-Content $env:PROJECT_FILE
          $propertyGroup = $project.Project.PropertyGroup[0]
          foreach ($name in @("Version", "PackageVersion", "InformationalVersion")) {
            if (-not $propertyGroup.$name) {
              $propertyGroup.AppendChild($project.CreateElement($name)) | Out-Null
            }
            $propertyGroup.$name = $version
          }
          foreach ($name in @("AssemblyVersion", "FileVersion")) {
            if (-not $propertyGroup.$name) {
              $propertyGroup.AppendChild($project.CreateElement($name)) | Out-Null
            }
            $propertyGroup.$name = $appxVersion
          }
          $project.Save((Join-Path $env:GITHUB_WORKSPACE $env:PROJECT_FILE))

          [xml]$packageManifest = Get-Content "Package.appxmanifest"
          $packageManifest.Package.Identity.Version = $appxVersion
          $packageManifest.Save((Join-Path $env:GITHUB_WORKSPACE "Package.appxmanifest"))

          [xml]$appManifest = Get-Content "app.manifest"
          $ns = New-Object System.Xml.XmlNamespaceManager($appManifest.NameTable)
          $ns.AddNamespace("asm", "urn:schemas-microsoft-com:asm.v1")
          $identity = $appManifest.SelectSingleNode("/asm:assembly/asm:assemblyIdentity", $ns)
          $identity.SetAttribute("version", $appxVersion)
          $appManifest.Save((Join-Path $env:GITHUB_WORKSPACE "app.manifest"))

      - name: Publish single file
        run: dotnet publish $env:PROJECT_FILE -c $env:CONFIGURATION -r win-x64 -p:PublishProfile=win-x64-single -p:Platform=x64 -p:PlatformTarget=x64 -p:Version=$env:APP_VERSION -p:PackageVersion=$env:APP_VERSION -p:InformationalVersion=$env:APP_VERSION -p:AssemblyVersion=$env:APPX_VERSION -p:FileVersion=$env:APPX_VERSION

      - name: Prepare release asset
        shell: pwsh
        run: |
          $singleDir = Join-Path $env:GITHUB_WORKSPACE "bin\$env:CONFIGURATION\$env:TARGET_FRAMEWORK\win-x64\single"
          $sourcePath = Join-Path $singleDir "RightMgr.exe"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          $assetPath = Join-Path $distDir "RightMgr.exe"

          if (-not (Test-Path $sourcePath)) {
            throw "Single-file executable not found: $sourcePath"
          }

          New-Item -ItemType Directory -Force $distDir | Out-Null
          Copy-Item -LiteralPath $sourcePath -Destination $assetPath -Force

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: RightMgr-win-x64-single
          path: dist/RightMgr.exe
          if-no-files-found: error

      - name: Upload single-file release asset
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RightMgr.exe
